<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       let sname, h, e, m, s, c,total, avg, sstatus;
       sname = prompt("Enter your name");
       h = parseInt(prompt("Enter your Hindi marks"));
       e = parseInt(prompt("Enter your English marks"));
       m = parseInt(prompt("Enter your Maths marks"));
       s = parseInt(prompt("Enter your Science marks"));
       c = parseInt(prompt("Enter your Computer marks"));
       total = h + e + m + s + c;
               avg = total / 5;
               if(avg >= 90){
                sstatus = "A+";
               }else if(avg >= 80){
                sstatus = "A";
               }else if(avg >= 70){
                sstatus = "B+";
               }else if(avg >= 60){
                sstatus = "B";
               }else if(avg >= 50){
                sstatus = "C";
               }else{
                sstatus = "Fail";
               }
               document.write("<h1>Student Report Card</h1>");
               document.write("<p>Name: " + sname + "</p>");
               document.write("<p>Total Marks: " + total + "</p>");
               document.write("<p>Average Marks: " + avg + "</p>");
               document.write("<p>Status: " + sstatus + "</p>");
    </script>
</body>
</html>
