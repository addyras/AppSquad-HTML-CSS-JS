<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Camp Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #b30000;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }
        .inline-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .inline-group label {
            font-weight: normal;
            display: inline-block;
            margin-bottom: 0;
        }
        .button-group {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #b30000;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button[type="reset"] {
            background-color: #666;
            margin-left: 10px;
        }
        button:hover {
            background-color: #800000;
        }
        button[type="reset"]:hover {
            background-color: #444;
        }
        .map-section {
            margin-top: 40px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        iframe {
            width: 100%;
            height: 350px;
            border: 0;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Blood Donation Camp Registration</h1>
    <p style="text-align: center;">Give blood, save lives. Please fill out the form below to register.</p>

    <form action="#" method="POST">
        
        <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" name="fullName" required placeholder="Aditya Rastogi">
        </div>

        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="aditya@example.com">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required placeholder="1234567890">
        </div>

        <div class="form-group">
            <label for="age">Age * (Must be between 18 and 65)</label>
            <input type="number" id="age" name="age" min="18" max="65" required>
        </div>
        <div class="form-group">
            <label for="bloodGroup">Blood Group *</label>
            <select id="bloodGroup" name="bloodGroup" required>
                <option value="" disabled selected>Select your blood group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </div>

        <div class="form-group">
            <label>Gender *</label>
            <div class="inline-group">
                <input type="radio" id="male" name="gender" value="Male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
            </div>
        </div>

        <div class="form-group">
            <label for="donationDate">Preferred Donation Date *</label>
            <input type="date" id="donationDate" name="donationDate" required>
        </div>
        <div class="form-group">
            <label for="donationTime">Preferred Time Slot *</label>
            <input type="time" id="donationTime" name="donationTime" required>
        </div>

        <div class="form-group">
            <label>Medical Eligibility (Check all that apply to you) *</label>
            <div class="inline-group" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                <div>
                    <input type="checkbox" id="weightCheck" name="eligibility" value="Weight>50" required>
                    <label for="weightCheck">I weigh more than 50 kg (110 lbs).</label>
                </div>
                <div>
                    <input type="checkbox" id="healthCheck" name="eligibility" value="GoodHealth" required>
                    <label for="healthCheck">I am currently in good health and not taking antibiotics.</label>
                </div>
                <div>
                    <input type="checkbox" id="tattooCheck" name="eligibility" value="NoRecentTattoo" required>
                    <label for="tattooCheck">I have not had a tattoo or piercing in the last 6 months.</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="address">Full Address</label>
            <textarea id="address" name="address" rows="3" placeholder="Enter your residential address..."></textarea>
        </div>
        
        <div class="form-group">
            <label for="notes">Any Special Notes / Medical History</label>
            <textarea id="notes" name="notes" rows="2" placeholder="Let us know if you have any conditions we should be aware of..."></textarea>
        </div>

        <div class="button-group">
            <button type="submit">Register Now</button>
            <button type="reset">Clear Form</button>
        </div>
    </form>

    <div class="map-section">
        <h2>Camp Location: Central Blood Bank</h2>
        <p style="text-align: center;">Please arrive 10 minutes prior to your scheduled time.</p>
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3502.327663242691!2d77.20456101508226!3d28.62002578242278!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd5b347b5bd5%3A0xcb1b51e9488a0b0d!2sIndian%20Red%20Cross%20Society!5e0!3m2!1sen!2sin!4v1687501234567!5m2!1sen!2sin" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>

</body>
</html>
